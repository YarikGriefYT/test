<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='rgba(255,215,0,0.15)' stroke='%23FFD700' stroke-width='2.5'/><circle cx='16' cy='16' r='6' fill='%23FFD700'/></svg>") 16 16, auto;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('IMG_20260517_211039_378.jpg') no-repeat center center fixed;
      background-size: cover;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255, 200, 100, 0.05) 0%, transparent 70%);
      animation: pulseGlow 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }

    .container {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .animate-item {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .animate-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .delay-1 { transition-delay: 0.1s; }
    .delay-2 { transition-delay: 0.2s; }
    .delay-3 { transition-delay: 0.3s; }
    .delay-4 { transition-delay: 0.4s; }
    .delay-5 { transition-delay: 0.5s; }
    .delay-6 { transition-delay: 0.6s; }
    .delay-7 { transition-delay: 0.7s; }
    .delay-8 { transition-delay: 0.8s; }
    .delay-9 { transition-delay: 0.9s; }

    .profile-link {
      display: block;
      text-decoration: none;
      color: inherit;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
    }

    .profile-link:hover {
      background: rgba(0, 0, 0, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    .profile-link:active {
      transform: scale(0.98);
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      flex-shrink: 0;
      overflow: hidden;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .avatar:hover {
      transform: scale(1.05);
      border-color: #FFD700;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
    }

    .profile-info h1 {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
      background: linear-gradient(135deg, #8B5CF6 0%, #D946EF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-info .username {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
      font-weight: 400;
      margin-top: 2px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .link-item {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 18px 0;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      color: white;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .link-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .link-item:hover::before {
      opacity: 1;
    }

    .link-item:hover {
      background: rgba(0, 0, 0, 0.5);
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .link-item:active {
      transform: scale(0.96);
    }

    .link-item i {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #ffffff;
      transition: transform 0.3s ease;
    }

    .link-item:hover i {
      transform: scale(1.2);
    }

    .link-item span {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .link-item.telegram i { color: #2AABEE; }
    .link-item.github i { color: #ffffff; }
    .link-item.tiktok i { color: #FF0050; }
    .link-item.vk i { color: #4A76A8; }

    .link-item.maintenance i {
      color: #a0a0a0;
      position: relative;
    }

    .link-item.maintenance i::after {
      content: '\f023';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      font-size: 0.7rem;
      position: absolute;
      bottom: -2px;
      right: -6px;
      color: #ff6b6b;
      background: rgba(0,0,0,0.6);
      padding: 1px 3px;
      border-radius: 4px;
    }

    .projects-card {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .projects-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 200, 100, 0.1), rgba(255, 150, 50, 0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .projects-card:hover::before {
      opacity: 1;
    }

    .projects-card:hover {
      background: rgba(0, 0, 0, 0.5);
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 200, 100, 0.4);
    }

    .projects-card i {
      font-size: 1.8rem;
      color: white;
      transition: transform 0.3s ease;
    }

    .projects-card:hover i {
      transform: rotate(20deg) scale(1.1);
    }

    .projects-card .info h3 {
      font-size: 1rem;
      font-weight: 600;
    }

    .projects-card .info p {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.6);
    }

    /* ===== КНОПКА КОПИРКА ===== */
    .copka-card {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 215, 0, 0.15);
      border-radius: 24px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: white;
      position: relative;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .copka-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 165, 0, 0.05));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .copka-card:hover::before {
      opacity: 1;
    }

    .copka-card:hover {
      background: rgba(0, 0, 0, 0.5);
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 215, 0, 0.3);
    }

    .copka-card i {
      font-size: 1.8rem;
      color: #FFD700;
      transition: transform 0.3s ease;
    }

    .copka-card:hover i {
      transform: rotate(10deg) scale(1.1);
    }

    .copka-card .info h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #FFD700;
    }

    .copka-card .info p {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
    }

    /* ===== YOUTUBE КНОПКА ===== */
    .youtube-full {
      border-radius: 24px;
      padding: 12px 16px;
      flex-direction: row;
      gap: 10px;
      justify-content: center;
      margin-top: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 0, 0, 0.2);
      text-decoration: none;
      display: flex;
      align-items: center;
      color: white;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .youtube-full::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 0, 0, 0.2), rgba(255, 0, 0, 0.05));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .youtube-full:hover::before {
      opacity: 1;
    }

    .youtube-full:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
      border-color: #FF0000;
    }

    .youtube-full:active {
      transform: scale(0.96);
    }

    .youtube-full i {
      font-size: 1.4rem;
      color: #FF0000;
      transition: transform 0.3s ease;
    }

    .youtube-full:hover i {
      transform: scale(1.1);
    }

    .youtube-full span {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .youtube-full .maintenance-badge {
      font-size: 0.5rem;
      background: rgba(255, 0, 0, 0.2);
      padding: 2px 8px;
      border-radius: 10px;
      color: #ff6b6b;
      margin-left: 6px;
      font-weight: 400;
    }

    /* ===== МЕНЮ ВИЗУАЛИЗАТОРА ===== */
    .audio-menu {
      width: 100%;
      margin-top: 12px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 14px 18px 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .audio-menu.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .visualizer-canvas {
      width: 100%;
      height: 35px;
      display: block;
      border-radius: 8px;
    }

    .audio-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .audio-status {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .audio-status .status-on {
      color: #8B5CF6;
    }

    .audio-status .status-off {
      color: #FF5F6D;
    }

    .mute-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 4px 12px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .mute-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .mute-btn.muted {
      border-color: rgba(255, 0, 0, 0.2);
      color: #FF5F6D;
    }

    .mute-btn.muted:hover {
      background: rgba(255, 0, 0, 0.1);
    }

    @media (max-width: 480px) {
      .visualizer-canvas {
        height: 30px;
      }
      .audio-menu {
        padding: 12px 14px 10px;
      }
    }

    @media (max-width: 380px) {
      .profile-info h1 { font-size: 1.4rem; }
      .avatar { width: 60px; height: 60px; }
      .grid-container { gap: 8px; }
      .link-item { padding: 12px 0; }
      .link-item i { font-size: 1.3rem; }
      .youtube-full { padding: 10px 14px; }
      .youtube-full i { font-size: 1.2rem; }
      .audio-menu {
        padding: 10px 12px 8px;
      }
      .visualizer-canvas {
        height: 25px;
      }
    }

    /* ===== ЗАГРУЗОЧНЫЙ ЭКРАН ===== */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0b0b0b;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      animation: fadeInUp 0.8s ease;
    }

    .loader-ring {
      width: 60px;
      height: 60px;
      position: relative;
    }

    .loader-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(255, 215, 0, 0.1);
    }

    .loader-ring::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #FFD700;
      border-right-color: #FFA500;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: rgba(255, 215, 0, 0.7);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
    }

    /* ===== ЭКРАН ВХОДА ===== */
    #enter-screen {
      position: fixed;
      inset: 0;
      background: rgba(11, 11, 11, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      cursor: pointer;
      transition: opacity 0.6s ease;
    }

    #enter-screen.visible {
      display: flex;
    }

    #enter-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .enter-content {
      text-align: center;
      animation: fadeInUp 0.8s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .enter-content .cursor {
      display: inline-block;
      width: 2px;
      height: 20px;
      background: #FFD700;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .enter-content .text {
      color: #FFD700;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<!-- ===== ЗВУК КЛИКА ===== -->
<audio id="click-sound" preload="auto" volume="0.3">
  <source src="click.mp3" type="audio/mpeg">
</audio>

<!-- ===== ЗАГРУЗОЧНЫЙ ЭКРАН ===== -->
<div id="loading-screen">
  <div class="loading-content">
    <div class="loader-ring"></div>
    <div class="loading-text">Loading assets...</div>
  </div>
</div>

<!-- ===== ЭКРАН ВХОДА ===== -->
<div id="enter-screen">
  <div class="enter-content">
    <span class="cursor"></span>
    <span class="text">Click to enter</span>
  </div>
</div>

<audio id="bg-music" loop preload="auto">
  <source src="ss6.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <!-- ===== ПРОФИЛЬ ===== -->
  <a href="https://t.me/sl3dsled_akasl3d52" target="_blank" class="profile-link animate-item delay-1" id="profile-item">
    <div class="avatar">
      <img src="https://avatars.mds.yandex.net/i?id=b7736b38a5ff44ab50a8f27c7d4bd188_l-5361789-images-thumbs&n=13" alt="sl3dsled">
    </div>
    <div class="profile-info">
      <h1>sl3dsled</h1>
      <div class="username">@sl3dsled_akasl3d52</div>
    </div>
  </a>

  <!-- ===== СЕТКА 2x2 ===== -->
  <div class="grid-container">
    <a href="https://t.me/ImSled" target="_blank" class="link-item telegram animate-item delay-2" id="tgk-item">
      <i class="fab fa-telegram"></i>
      <span>тгк</span>
    </a>

    <a href="https://github.com/F1limon4ick" target="_blank" class="link-item github animate-item delay-3" id="github-item">
      <i class="fab fa-github"></i>
      <span>github</span>
    </a>

    <a href="#" class="link-item tiktok maintenance animate-item delay-4" id="tiktok-item">
      <i class="fab fa-tiktok"></i>
      <span>тикток <span style="font-size:0.5rem;color:#ff6b6b;">🔒</span></span>
    </a>

    <a href="https://vk.com/progawhite" target="_blank" class="link-item vk animate-item delay-5" id="vk-item">
      <i class="fab fa-vk"></i>
      <span>вк</span>
    </a>
  </div>

  <!-- ===== ТГК КОМАНДЫ ===== -->
  <a href="https://t.me/sl3dteams" target="_blank" class="projects-card animate-item delay-6" id="tgk-commands-item" style="margin-bottom: 16px;">
    <i class="fas fa-users"></i>
    <div class="info">
      <h3>тгк команды</h3>
      <p>@sl3dteams — обсуждения и команды</p>
    </div>
  </a>

  <!-- ===== КОПИРКА ===== -->
  <a href="https://t.me/copka_me" target="_blank" class="copka-card animate-item delay-7" id="copka-item">
    <i class="fas fa-copy"></i>
    <div class="info">
      <h3>копирка</h3>
      <p>перейти в копирку</p>
    </div>
  </a>

  <!-- ===== YOUTUBE КНОПКА ===== -->
  <a href="#" class="youtube-full animate-item delay-8" id="youtube-item">
    <i class="fab fa-youtube"></i>
    <span>YouTube</span>
    <span class="maintenance-badge">на тех работах</span>
  </a>

  <!-- ===== МЕНЮ ВИЗУАЛИЗАТОРА ===== -->
  <div class="audio-menu" id="audio-menu">
    <canvas class="visualizer-canvas" id="visualizer-canvas"></canvas>
    <div class="audio-controls">
      <div class="audio-status">
        audio: <span id="status-text" class="status-on">ON</span>
      </div>
      <button class="mute-btn" id="mute-btn">[ mute ]</button>
    </div>
  </div>
</div>

<script>
  const loadingScreen = document.getElementById('loading-screen');
  const enterScreen = document.getElementById('enter-screen');
  const audio = document.getElementById('bg-music');
  const clickSound = document.getElementById('click-sound');
  const animatedItems = document.querySelectorAll('.animate-item');
  const audioMenu = document.getElementById('audio-menu');

  if (clickSound) {
    clickSound.volume = 0.3;
  }

  // ================================
  // ЗАГРУЗКА → ЭКРАН ВХОДА
  // ================================
  setTimeout(() => {
    loadingScreen.classList.add('hidden');
    enterScreen.classList.add('visible');
  }, 3000);

  // ================================
  // КЛИК НА ЭКРАН ВХОДА
  // ================================
  enterScreen.addEventListener('click', () => {
    if (clickSound) {
      clickSound.currentTime = 0;
      clickSound.play().catch(() => {});
    }

    enterScreen.classList.add('hidden');

    if (audio) {
      audio.play().then(() => {
        updateAudioUI(true);
      }).catch((error) => {
        console.log('Ошибка воспроизведения:', error);
      });
    }

    animatedItems.forEach((item, index) => {
      setTimeout(() => {
        item.classList.add('visible');
      }, 100 + (index * 100));
    });

    setTimeout(() => {
      audioMenu.classList.add('visible');
    }, 500);
  });

  // ================================
  // ЗВУК КЛИКА НА ВСЕ КНОПКИ
  // ================================
  document.querySelectorAll('a, button, .link-item, .projects-card, .copka-card, .youtube-full, .profile-link').forEach(el => {
    el.addEventListener('click', function(e) {
      if (clickSound) {
        clickSound.currentTime = 0;
        clickSound.play().catch(() => {});
      }
    });
  });

  // ================================
  // ВИЗУАЛИЗАТОР
  // ================================
  const canvas = document.getElementById('visualizer-canvas');
  const ctx = canvas.getContext('2d');
  const statusText = document.getElementById('status-text');
  const muteBtn = document.getElementById('mute-btn');

  let audioContext, analyser, dataArray, source;
  let animationId = null;
  let isVisualizerActive = false;

  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
    canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  }

  function initVisualizer() {
    if (!audio) return;
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 64;
      analyser.smoothingTimeConstant = 0.8;
      
      source = audioContext.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioContext.destination);
      
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      
      isVisualizerActive = true;
      drawVisualizer();
    } catch (e) {
      console.log('Визуализатор не поддерживается:', e);
    }
  }

  function drawVisualizer() {
    if (!isVisualizerActive) return;
    
    animationId = requestAnimationFrame(drawVisualizer);
    
    analyser.getByteFrequencyData(dataArray);
    
    const width = canvas.width / (window.devicePixelRatio || 1);
    const height = canvas.height / (window.devicePixelRatio || 1);
    
    ctx.clearRect(0, 0, width, height);
    
    const barWidth = (width / dataArray.length) * 1.5;
    let x = 0;
    
    for (let i = 0; i < dataArray.length; i++) {
      const value = dataArray[i];
      const barHeight = (value / 255) * height;
      
      const gradient = ctx.createLinearGradient(0, height, 0, 0);
      gradient.addColorStop(0, 'rgba(139, 92, 246, 0.1)');
      gradient.addColorStop(0.5, 'rgba(139, 92, 246, 0.7)');
      gradient.addColorStop(1, 'rgba(139, 92, 246, 1)');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(x, height - barHeight, barWidth - 1, barHeight);
      
      x += barWidth;
    }
  }

  function updateAudioUI(isPlaying) {
    if (isPlaying) {
      statusText.textContent = 'ON';
      statusText.className = 'status-on';
      muteBtn.textContent = '[ mute ]';
      muteBtn.classList.remove('muted');
    } else {
      statusText.textContent = 'OFF';
      statusText.className = 'status-off';
      muteBtn.textContent = '[ unmute ]';
      muteBtn.classList.add('muted');
    }
  }

  audio.addEventListener('play', () => {
    updateAudioUI(true);
    if (!audioContext) {
      initVisualizer();
    } else if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    isVisualizerActive = true;
    drawVisualizer();
  });

  audio.addEventListener('pause', () => {
    updateAudioUI(false);
    isVisualizerActive = false;
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
    const width = canvas.width / (window.devicePixelRatio || 1);
    const height = canvas.height / (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, width, height);
  });

  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  });
</script>

</body>
</html>
